<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Sonar Ultra</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; display: none; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #00ffff; z-index: 10; font-family: monospace; text-shadow: 0 0 10px cyan; }
    </style>
</head>
<body>

<div id="ui">[ MOTION DETECTION ACTIVE ]</div>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let prevFrame = null;

    async function init() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            render();
        };
    }

    function render() {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        let currFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        if (prevFrame) {
            let pixels = currFrame.data;
            let oldPixels = prevFrame.data;
            
            for (let i = 0; i < pixels.length; i += 4) {
                // دۆزینەوەی جیاوازی نێوان دوو وێنە (جووڵە)
                let diff = Math.abs(pixels[i] - oldPixels[i]) + 
                           Math.abs(pixels[i+1] - oldPixels[i+1]) + 
                           Math.abs(pixels[i+2] - oldPixels[i+2]);
                
                if (diff > 50) { // ئەگەر جووڵە هەبوو، ڕەنگی بکە بە شین
                    pixels[i] = 0;    // سوور لابدە
                    pixels[i+1] = 255; // سەوز زیاد بکە
                    pixels[i+2] = 255; // شین زیاد بکە (دەبێتە شینی گەش)
                } else {
                    // ئەگەر جووڵە نەبوو، وێنەکە زۆر تاریک بکە
                    pixels[i] *= 0.1;
                    pixels[i+1] *= 0.1;
                    pixels[i+2] *= 0.1;
                }
            }
            ctx.putImageData(currFrame, 0, 0);
        }
        
        prevFrame = currFrame;
        requestAnimationFrame(render);
    }

    init();
</script>
</body>
</html>
