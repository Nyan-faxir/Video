<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faxir AI - System Active 🔱</title>
    <style>
        body { background: #050505; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: linear-gradient(to bottom, #0a0a0a, #050505); }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 15px; line-height: 1.6; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bot { background: #1e293b; align-self: flex-start; color: #38bdf8; border-bottom-left-radius: 2px; border: 1px solid #334155; }
        .user { background: #0284c7; align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
        #input-area { padding: 15px; background: #0f0f0f; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none; }
        button { background: #0284c7; border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .typing { font-size: 12px; color: #555; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div style="text-align: center; padding: 15px; background: #0f0f0f; border-bottom: 2px solid #0284c7; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
    <h3 style="margin:0; color: #38bdf8; font-family: monospace;">[ FAXIR INTELLIGENCE ] 🔱</h3>
</div>

<div id="chat-box">
    <div class="msg bot">سڵاو فاکره‌ گیان، سیستەم ئامادەیە. فەرموو پرسیارەکەت بنووسە.</div>
</div>
<div id="typing-indicator" class="typing" style="padding: 0 20px;">AI خەریکی نووسینە...</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="چی بنووسم؟..." autocomplete="off">
    <button id="sendBtn">ناردن</button>
</div>

<script>
    const API_KEY = "AIzaSyBZEp_pnb35bMDXYp6bVcmP0Wg4wdGutzw";
    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    const typing = document.getElementById('typing-indicator');

    async function askAI() {
        const text = input.value.trim();
        if (!text) return;

        chatBox.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;
        typing.style.display = "block";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "وەڵام بدەرەوە بە کوردییەکی زۆر کورت و هاوڕێیانە وەک سکرتێری فاکره‌: " + text }] }]
                })
            });

            const data = await response.json();
            typing.style.display = "none";

            if (data.candidates && data.candidates[0].content) {
                const botText = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `<div class="msg bot">${botText}</div>`;
            } else {
                chatBox.innerHTML += `<div class="msg bot">هەڵەیەک لە وەڵامی سێرڤەر هەبوو. تکایە دواتر تاقی بکەرەوە.</div>`;
            }
        } catch (error) {
            typing.style.display = "none";
            chatBox.innerHTML += `<div class="msg bot">کێشەیەک لە پەیوەندی دروست بوو. دڵنیابە کلیلەکە چالاکە.</div>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    btn.onclick = askAI;
    input.onkeypress = (e) => { if (e.key === 'Enter') askAI(); };
</script>

</body>
</html>
