<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Military Night Vision Sonar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        /* فلتەری سەوز بۆ شاشەکە */
        #container { 
            position: relative; width: 100vw; height: 100vh;
            filter: sepia(100%) hue-rotate(90deg) brightness(1.2) contrast(1.5);
        }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #00ff00; z-index: 10; font-family: monospace; font-size: 18px; text-shadow: 0 0 5px #00ff00; }
        .grid { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(circle, #00ff00 1px, transparent 1px); background-size: 30px 30px; opacity: 0.1; z-index: 2; }
    </style>
</head>
<body>

<div id="ui">[ NVG ACTIVE ] - SENSITIVITY: HIGH</div>
<div id="container">
    <div class="grid"></div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    async function startApp() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;

        const net = await bodyPix.load({
            architecture: 'MobileNetV1',
            outputStride: 16,
            multiplier: 0.50,
            quantBytes: 2
        });

        function detect() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // لێرەدا Threshold کراوە بە 0.35 بۆ ئەوەی زۆر بە ئاسانی مرۆڤ بناسێتەوە
            net.segmentPerson(video, { 
                internalResolution: 'medium', 
                segmentationThreshold: 0.35 
            })
            .then(segmentation => {
                const mask = bodyPix.toMask(segmentation, {r:0, g:255, b:255, a:200}, {r:0, g:0, b:0, a:0});
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                bodyPix.drawMask(canvas, video, mask, 1, 0, false);
                requestAnimationFrame(detect);
            });
        }
        detect();
    }
    startApp();
</script>
</body>
</html>
