<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sonar Scanner 🔱</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.9.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.0"></script>
    <style>
        body { margin: 0; background: black; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 5; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #00ffff; z-index: 10; font-weight: bold; letter-spacing: 2px; }
        /* هێڵی جوڵاوی سۆنەر */
        .scan-line { position: absolute; width: 100%; height: 2px; background: cyan; box-shadow: 0 0 15px cyan; z-index: 8; animation: move 3s linear infinite; }
        @keyframes move { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

<div id="ui">SYSTEM: <span id="msg">INITIALIZING AI...</span></div>
<div id="container">
    <div class="scan-line"></div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const msg = document.getElementById('msg');

    async function startApp() {
        try {
            // ١. کردنەوەی کامێرا
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment' }, audio: false 
            });
            video.srcObject = stream;
            
            // ٢. بارکردنی مۆدێل بە وەشانی MobileNet (زۆر خێرایە)
            msg.innerText = "LOADING MODEL (PLEASE WAIT)...";
            const net = await bodyPix.load({
                architecture: 'MobileNetV1',
                outputStride: 16,
                multiplier: 0.50,
                quantBytes: 2
            });

            msg.innerText = "SCANNING FOR HUMAN SIGNATURES";
            
            function detect() {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                net.segmentPerson(video, { internalResolution: 'low', segmentationThreshold: 0.7 })
                .then(segmentation => {
                    // ڕەنگی شینی سۆنەر (Neon Blue)
                    const mask = bodyPix.toMask(segmentation, {r:0, g:255, b:255, a:180}, {r:0, g:0, b:0, a:0});
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    bodyPix.drawMask(canvas, video, mask, 0.8, 0, false);
                    requestAnimationFrame(detect);
                });
            }
            detect();
        } catch (err) {
            msg.innerText = "ERROR: ACCESS DENIED";
            console.error(err);
        }
    }

    startApp();
</script>
</body>
</html>
